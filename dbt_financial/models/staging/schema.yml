version: 2

models:
  - name: stg_transactions
    description: "Cleaned transactions from Silver layer"
    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: amount
        tests:
          - not_null

      - name: transaction_type
        tests:
          - not_null
          - accepted_values:
              values: ['CREDIT', 'DEBIT', 'TRANSFER']

      - name: transaction_status
        tests:
          - not_null
          - accepted_values:
              values: ['COMPLETED', 'PENDING', 'FAILED']

      - name: risk_level
        tests:
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']

      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ['EUR', 'USD', 'GBP', 'CHF', 'SEK']

      - name: country_code
        tests:
          - not_null
          - accepted_values:
              values: ['DE', 'FR', 'NL', 'GB', 'SE', 'ES', 'IT', 'PL']